<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0f14;
      color: #e2e4ed;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #1e2130;
    }

    .header img { width: 28px; height: 28px; border-radius: 6px; }

    .header-text { flex: 1; }

    .header-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #f0f2ff;
    }

    .header-sub {
      font-size: 10px;
      color: #4b5270;
      margin-top: 1px;
    }

    /* ── Status banner ── */
    .status-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid #1e2130;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-live   { background: #60a5fa; box-shadow: 0 0 6px #3b82f6; animation: pulse 1.8s infinite; }
    .dot-watch  { background: #f59e0b; }
    .dot-off    { background: #374151; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .status-label {
      font-size: 12px;
      font-weight: 600;
    }

    .status-live  { color: #60a5fa; }
    .status-watch { color: #f59e0b; }
    .status-off   { color: #6b7280; }

    /* ── Info rows ── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 16px;
      border-bottom: 1px solid #1a1d28;
    }

    .info-row:last-of-type { border-bottom: none; }

    .info-key {
      font-size: 11px;
      color: #4b5270;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .info-val {
      font-size: 11px;
      color: #9ba3c0;
      font-variant-numeric: tabular-nums;
    }

    /* ── Open button ── */
    #openBtn {
      display: none;
      width: calc(100% - 32px);
      margin: 12px 16px 14px;
      padding: 10px;
      background: #1e3a8a;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s;
    }

    #openBtn:hover { background: #1e40af; }

    #summaryBtn {
      display: none;
      width: calc(100% - 32px);
      margin: 0 16px 14px;
      padding: 10px;
      background: #1a1d27;
      color: #60a5fa;
      border: 1px solid #1e3a8a;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #summaryBtn:hover { background: #1e2130; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="" />
    <div class="header-text">
      <div class="header-title">Dairy Report Watcher</div>
      <div class="header-sub">AMS · National Dairy Products Sales</div>
    </div>
  </div>

  <div class="status-banner">
    <div id="dot" class="dot dot-off"></div>
    <span id="statusLabel" class="status-label status-off">—</span>
  </div>

  <div id="infoRows">
    <div class="info-row">
      <span class="info-key">Last Checked</span>
      <span id="lastChecked" class="info-val">—</span>
    </div>
    <div id="detectedRow" class="info-row" style="display:none">
      <span class="info-key">Report Detected</span>
      <span id="detectedAt" class="info-val">—</span>
    </div>
  </div>

  <button id="openBtn">Open Latest Report →</button>
  <button id="summaryBtn">View Market Summary →</button>

  <script src="popup.js"></script>
</body>
</html>
