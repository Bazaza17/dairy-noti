<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dairy Market Summary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0f14;
      color: #e2e4ed;
      padding: 32px 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    .header-left h1 {
      font-size: 20px;
      font-weight: 700;
    }

    .header-left .meta {
      font-size: 12px;
      color: #4b5270;
      margin-top: 4px;
    }

    .pdf-link {
      font-size: 12px;
      color: #60a5fa;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #1e3a8a;
      border-radius: 6px;
      white-space: nowrap;
    }

    .pdf-link:hover { background: #1e3a8a; }

    /* ── Brief ── */
    .brief {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 28px;
      line-height: 1.65;
      font-size: 13.5px;
      color: #c8cde0;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4b5270;
      margin-bottom: 12px;
    }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: right;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #4b5270;
      padding: 6px 12px;
      border-bottom: 1px solid #1e2130;
      white-space: nowrap;
    }

    thead th:first-child { text-align: left; }

    tbody tr { border-bottom: 1px solid #141620; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #13151f; }

    td {
      padding: 9px 12px;
      text-align: right;
      color: #9ba3c0;
      white-space: nowrap;
    }

    td:first-child {
      text-align: left;
      color: #e2e4ed;
      font-weight: 500;
    }

    .positive { color: #4ade80; }
    .negative { color: #f87171; }
    .neutral  { color: #9ba3c0; }

    /* ── Loading / error states ── */
    .state {
      text-align: center;
      padding: 60px 0;
      color: #4b5270;
    }

    .state .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #1e2130;
      border-top-color: #3b5bdb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .state p { font-size: 13px; }
  </style>
</head>
<body>

  <div id="loading" class="state">
    <div class="spinner"></div>
    <p>Generating summary…</p>
  </div>

  <div id="noKey" class="state" style="display:none">
    <p>No API key set. <a href="#" id="openOptions" style="color:#60a5fa">Open Settings</a> to add your Anthropic key.</p>
  </div>

  <div id="content" style="display:none">
    <header>
      <div class="header-left">
        <h1>Dairy Market Summary</h1>
        <div class="meta" id="metaLine">—</div>
      </div>
      <a id="pdfLink" class="pdf-link" href="#" target="_blank">Open Raw PDF →</a>
    </header>

    <div class="brief">
      <div class="section-title">Trader Brief</div>
      <div id="brief">—</div>
    </div>

    <div class="section-title">Current Week vs Prior Week</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Cur Wtd Avg</th>
            <th>Cur Low</th>
            <th>Cur High</th>
            <th>Cur Loads</th>
            <th>Prior Wtd Avg</th>
            <th>Prior Low</th>
            <th>Prior High</th>
            <th>Prior Loads</th>
            <th>Change</th>
            <th>Chg %</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="summary.js"></script>
</body>
</html>
