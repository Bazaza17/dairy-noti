<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dairy Market Summary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0f14;
      color: #e2e4ed;
      padding: 24px;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .title { font-size: 15px; font-weight: 700; color: #f0f2ff; }
    .meta  { font-size: 11px; color: #3d4263; margin-top: 3px; }

    .pdf-link {
      font-size: 11px;
      color: #60a5fa;
      text-decoration: none;
      padding: 5px 10px;
      border: 1px solid #1e3a8a;
      border-radius: 5px;
      white-space: nowrap;
    }
    .pdf-link:hover { background: #1e3a8a; }

    /* ── One-liner callout ── */
    .callout {
      background: #13151f;
      border-left: 3px solid #3b5bdb;
      border-radius: 0 6px 6px 0;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 12.5px;
      color: #9ba3c0;
      line-height: 1.5;
    }

    /* ── Product rows ── */
    .rows { display: flex; flex-direction: column; gap: 6px; }

    .row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #13151f;
      border: 1px solid #1a1d28;
      position: relative;
      overflow: hidden;
    }

    /* Subtle tint based on direction */
    .row.up   { border-left: 3px solid #16a34a; }
    .row.down { border-left: 3px solid #dc2626; }
    .row.flat { border-left: 3px solid #374151; }

    /* Background fill showing magnitude */
    .row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: var(--mag, 0%);
      opacity: 0.04;
      pointer-events: none;
    }
    .row.up::before   { background: #22c55e; }
    .row.down::before { background: #ef4444; }

    .product-name {
      font-size: 13px;
      font-weight: 600;
      color: #e2e4ed;
      white-space: nowrap;
    }

    /* Change bar */
    .bar-wrap {
      width: 80px;
      height: 4px;
      background: #1e2130;
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      width: var(--bar, 0%);
    }
    .up   .bar-fill { background: #22c55e; }
    .down .bar-fill { background: #ef4444; }
    .flat .bar-fill { background: #374151; }

    .change-col {
      text-align: right;
      min-width: 70px;
    }
    .change-val {
      display: block;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .change-pct {
      font-size: 10px;
      margin-top: 1px;
      display: block;
      opacity: 0.7;
    }
    .up   .change-val, .up   .change-pct { color: #4ade80; }
    .down .change-val, .down .change-pct { color: #f87171; }
    .flat .change-val, .flat .change-pct { color: #6b7280; }

    .price-col {
      text-align: right;
      min-width: 60px;
    }
    .price-val {
      font-size: 14px;
      font-weight: 700;
      color: #f0f2ff;
      font-variant-numeric: tabular-nums;
    }
    .price-label {
      font-size: 9px;
      color: #3d4263;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    /* ── States ── */
    .state {
      text-align: center;
      padding: 80px 0;
      color: #4b5270;
      font-size: 13px;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #1e2130;
      border-top-color: #3b5bdb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading" class="state">
    <div class="spinner"></div>
    <p>Generating summary…</p>
  </div>

  <div id="content" style="display:none">
    <div class="header">
      <div>
        <div class="title">Dairy Market Summary</div>
        <div class="meta" id="metaLine">—</div>
      </div>
      <a id="pdfLink" class="pdf-link" href="#" target="_blank">Raw PDF →</a>
    </div>

    <div class="callout" id="oneLiner">—</div>

    <div class="rows" id="rows"></div>
  </div>

  <script src="summary.js"></script>
</body>
</html>
